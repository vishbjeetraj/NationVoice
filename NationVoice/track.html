<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Track Status | NationVoice</title>
  <link rel="stylesheet" href="/src/css/style.css" />
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">
  
  <header class="glass-nav">
    <div class="container nav-container">
      <a href="/" class="logo">
        <svg fill="currentColor" viewBox="0 0 24 24" width="28" height="28">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14.5v-3H8v3H6v-7h2V8h4v1.5h2v7h-3z"></path>
        </svg>
        NationVoice
      </a>
      <nav>
        <ul class="nav-links"></ul> 
      </nav>
    </div>
  </header>

  <main style="flex: 1; padding: 4rem 0;">
    <div class="container text-center animate-fade-in" style="max-width: 600px;">
      <h2>Track Complaint Status</h2>
      <p>Enter your unique Complaint ID (e.g. NV-12345) to see real-time progress.</p>
      
      <form id="trackForm" class="mt-2 glass" style="display: flex; padding: 1rem; border-radius: 50px;">
        <input type="text" id="trackId" class="form-control" placeholder="Enter Complaint ID" required style="border: none; background: transparent; box-shadow: none; padding-left: 1rem; margin-bottom: 0;">
        <button type="submit" class="btn btn-primary" style="margin-left: 1rem; border-radius: 30px;">Track</button>
      </form>
    </div>

    <!-- Result Display Container -->
    <div class="container mt-4" id="resultContainer" style="max-width: 800px; display: none;">
      <!-- Populated via JS -->
    </div>
  </main>

  <script type="module" src="/src/js/main.js"></script>
  <script type="module" src="/src/js/track.js"></script>
</body>
</html>
